name: ekk-idms

services:

  db:
    container_name: ekk_postgres
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekk_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-ekk_idms}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./files/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ekk} -d ${POSTGRES_DB:-ekk_idms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: ekk_redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: ekk_api
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ekk}:${POSTGRES_PASSWORD:-ekk_dev_2026}@db:5432/${POSTGRES_DB:-ekk_idms}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./services/api:/app
      - ./alembic:/alembic
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude venv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migrate:
    container_name: ekk_migrate
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ekk}:${POSTGRES_PASSWORD:-ekk_dev_2026}@db:5432/${POSTGRES_DB:-ekk_idms}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - ./alembic:/alembic
    command: alembic -c /app/alembic.ini upgrade head
    restart: "no"

  celery_worker:
    container_name: ekk_celery
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ekk}:${POSTGRES_PASSWORD:-ekk_dev_2026}@db:5432/${POSTGRES_DB:-ekk_idms}
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - ./alembic:/alembic
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    container_name: ekk_celery_beat
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ekk}:${POSTGRES_PASSWORD:-ekk_dev_2026}@db:5432/${POSTGRES_DB:-ekk_idms}
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - ./alembic:/alembic
    command: celery -A celery_app beat --loglevel=info

  frontend:
    container_name: ekk_frontend
    build:
      context: ../ekk-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    restart: unless-stopped
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    container_name: ekk_nginx
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./files/downloads:/srv/downloads:ro

  adminer:
    container_name: ekk_adminer
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  metabase:
    container_name: ekk_metabase
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB:-ekk_idms}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-ekk}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-ekk_dev_2026}
      MB_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3100:3000"

volumes:
  pg_data:
