events { worker_connections 1024; }

http {
    client_max_body_size 50M;

    # Re-resolve Docker service names every 30s so nginx picks up new container IPs
    # after rebuilds/restarts without requiring an nginx restart.
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Use variables so nginx resolves upstreams lazily via the resolver above
        set $api_upstream      http://api:8000;
        set $frontend_upstream http://frontend:80;

        location /api/              { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /auth/             { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /chat/             { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /project-config/   { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /reference-data/   { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /level-register/   { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /ogl/              { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /gps/              { proxy_pass $api_upstream; proxy_set_header Host $host; }
        location /health            { proxy_pass $api_upstream; }
        location /docs              { proxy_pass $api_upstream; }
        location /redoc             { proxy_pass $api_upstream; }
        location /downloads/ {
            alias /srv/downloads/;
            autoindex off;
            types { application/vnd.android.package-archive apk; }
            default_type application/vnd.android.package-archive;
        }
        location /                  { proxy_pass $frontend_upstream; }
    }
}
