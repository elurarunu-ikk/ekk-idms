events { worker_connections 1024; }

http {
    upstream api    { server api:8000; }
    upstream frontend { server frontend:3000; }

    server {
        listen 80;
        server_name _;

        location /api/     { proxy_pass http://api; proxy_set_header Host $host; }
        location /auth/    { proxy_pass http://api; proxy_set_header Host $host; }
        location /health   { proxy_pass http://api; }
        location /docs     { proxy_pass http://api; }
        location /redoc    { proxy_pass http://api; }
        location /         { proxy_pass http://frontend; }
    }
}
