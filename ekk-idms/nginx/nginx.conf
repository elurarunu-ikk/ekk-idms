events { worker_connections 1024; }

http {
    client_max_body_size 50M;

    upstream api    { server api:8000; }
    upstream frontend { server frontend:80; }

    server {
        listen 80;
        server_name _;

        location /api/              { proxy_pass http://api; proxy_set_header Host $host; }
        location /auth/             { proxy_pass http://api; proxy_set_header Host $host; }
        location /chat/             { proxy_pass http://api; proxy_set_header Host $host; }
        location /project-config/   { proxy_pass http://api; proxy_set_header Host $host; }
        location /reference-data/   { proxy_pass http://api; proxy_set_header Host $host; }
        location /level-register/   { proxy_pass http://api; proxy_set_header Host $host; }
        location /ogl/              { proxy_pass http://api; proxy_set_header Host $host; }
        location /gps/              { proxy_pass http://api; proxy_set_header Host $host; }
        location /health            { proxy_pass http://api; }
        location /docs              { proxy_pass http://api; }
        location /redoc             { proxy_pass http://api; }
        location /downloads/ {
            alias /srv/downloads/;
            autoindex off;
            types { application/vnd.android.package-archive apk; }
            default_type application/vnd.android.package-archive;
        }
        location /                  { proxy_pass http://frontend; }
    }
}
